<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styles.css">
    <script src="js/validateSignup.js" type="module" defer></script>
    <title>Cadastro</title>
</head>
<body>
    <div id="signup-box" class="form-container">
        <div id="title-signup">
            <h1>Registre-se</h1>
        </div>
        <div>
            <form>
                <label for="username">Nome</label> <br>
                <input type="text" id="username" name="username" required> <br>
                <div class="error" id="invalid-user-error">Informe um nome válido!</div>
                <div class="error" id="used-user-error">Esse usuário já existe</div>

                <label for="email">Email</label> <br>
                <input type="text" id="email" name="email" required> <br>
                <div class="error" id="invalid-email-error">Informe um E-mail válido!</div>
                <div class="error" id="used-email-error">E-mail já cadastrado</div>

                <label for="password">Senha</label> <br>
                <input type="password" id="password" name="password" required> <br> <br>
                <div class="error" id="invalid-password-error">Senha inválida!</div>

                <button id="signup-button" class="button-solid" type="button">Cadastre-se</button>
            </form>
        </div>
    </div>
</body>
</html>
